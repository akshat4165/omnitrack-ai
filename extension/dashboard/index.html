<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OmniTrack Analytics Dashboard</title>
  <meta name="description" content="Cross-platform AI usage analytics for Claude, ChatGPT, and Gemini">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    h1 { font-size: 32px; margin-bottom: 8px; background: linear-gradient(90deg, #10a37f, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { color: #888; margin-bottom: 32px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 32px; }
    .card { background: #1a1a1a; border-radius: 16px; padding: 24px; border: 1px solid #2a2a2a; }
    .card h3 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
    .big-number { font-size: 48px; font-weight: 700; margin-bottom: 8px; }
    .chart-container { height: 200px; margin-top: 16px; }
    .export-btn { background: linear-gradient(90deg, #10a37f, #6366f1); color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: opacity 0.2s; }
    .export-btn:hover { opacity: 0.85; }
    .subtext { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>OmniTrack Analytics</h1>
    <div class="subtitle">Cross-platform AI usage intelligence</div>

    <div class="grid">
      <div class="card">
        <h3>Today's Total Requests</h3>
        <div class="big-number" id="totalRequests">-</div>
        <div class="subtext">Across all platforms</div>
      </div>
      <div class="card">
        <h3>Most Used Platform</h3>
        <div class="big-number" id="topPlatform">-</div>
        <div class="subtext" id="topPlatformPct">-</div>
      </div>
      <div class="card">
        <h3>Limits Hit This Week</h3>
        <div class="big-number" id="limitsHit">0</div>
        <div class="subtext">Rate limit violations</div>
      </div>
    </div>

    <div class="card" style="margin-bottom: 24px;">
      <h3>7-Day Usage Trends</h3>
      <div class="chart-container">
        <canvas id="trendChart"></canvas>
      </div>
    </div>

    <button class="export-btn" onclick="exportData()">Export CSV</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
